AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IAM users (ec2-user1, ec2-user2, s3-user) with groups, console access,
  permission boundaries, and a shared one-time password stored in Secrets Manager.

Resources:

  # ─────────────────────────────────────────────────────────
  # One-time password – auto-generated, stored in Secrets Manager
  # ─────────────────────────────────────────────────────────
  OneTimePassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /iam/one-time-passwordd
      Description: Shared temporary password for all IAM console users
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: password
        PasswordLength: 16
        ExcludeCharacters: '"@/\\'
        RequireEachIncludedType: true

  # ─────────────────────────────────────────────────────────
  # Permission Boundaries
  #   Boundaries cap the MAXIMUM permissions a user can ever have.
  #   Effective permissions = identity policies  boundary.
  # ─────────────────────────────────────────────────────────
  EC2ReadOnlyBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: EC2ReadOnlyBoundary
      Description: Caps a user at EC2 read-only operations and self-service password change
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ReadOnlyEC2
            Effect: Allow
            Action:
              - ec2:Describe*
              - ec2:Get*
              - ec2:List*
            Resource: '*'
          - Sid: SelfServiceIAM
            Effect: Allow
            Action:
              - iam:ChangePassword
              - iam:GetUser
              - iam:GetLoginProfile
            Resource: '*'

  EC2FullBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: EC2FullBoundary
      Description: Caps a user at full EC2 (launch + manage) and self-service password change
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: FullEC2
            Effect: Allow
            Action:
              - ec2:*
            Resource: '*'
          - Sid: PassRoleToEC2Only
            Effect: Allow
            Action:
              - iam:PassRole
            Resource: '*'
            Condition:
              StringEquals:
                iam:PassedToService: ec2.amazonaws.com
          - Sid: ReadInstanceProfiles
            Effect: Allow
            Action:
              - iam:ListInstanceProfiles
              - iam:ListInstanceProfilesForRole
              - iam:GetInstanceProfile
              - iam:ListRoles
            Resource: '*'
          - Sid: SelfServiceIAM
            Effect: Allow
            Action:
              - iam:ChangePassword
              - iam:GetUser
              - iam:GetLoginProfile
            Resource: '*'

  S3ListBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: S3ListBoundary
      Description: Caps a user at S3 list operations and self-service password change
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ListS3
            Effect: Allow
            Action:
              - s3:ListAllMyBuckets
              - s3:GetBucketLocation
            Resource: '*'
          - Sid: SelfServiceIAM
            Effect: Allow
            Action:
              - iam:ChangePassword
              - iam:GetUser
              - iam:GetLoginProfile
            Resource: '*'

  # ─────────────────────────────────────────────────────────
  # Groups – grant identity-level permissions.
  #   Both EC2 users belong to the SAME group (broad EC2 access);
  #   their boundaries are what differentiate them.
  # ─────────────────────────────────────────────────────────
  S3UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: S3UserGroup
      Policies:
        - PolicyName: S3GroupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:GetBucketLocation
                  - iam:ChangePassword
                Resource: '*'

  EC2UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: EC2UserGroup
      Policies:
        - PolicyName: EC2GroupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:*
                  - iam:ChangePassword
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: '*'
                Condition:
                  StringEquals:
                    iam:PassedToService: ec2.amazonaws.com
              - Effect: Allow
                Action:
                  - iam:ListInstanceProfiles
                  - iam:ListInstanceProfilesForRole
                  - iam:GetInstanceProfile
                  - iam:ListRoles
                Resource: '*'

  # ─────────────────────────────────────────────────────────
  # IAM Users
  #   Identity policies (via groups) grant broad EC2/S3 access;
  #   the PermissionsBoundary on each user is what scopes them down.
  # ─────────────────────────────────────────────────────────
  EC2User1:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user1
      PermissionsBoundary: !Ref EC2ReadOnlyBoundary
      Groups:
        - !Ref EC2UserGroup
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${OneTimePassword}:SecretString:password}}'
        PasswordResetRequired: true

  EC2User2:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user2
      PermissionsBoundary: !Ref EC2FullBoundary
      Groups:
        - !Ref EC2UserGroup
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${OneTimePassword}:SecretString:password}}'
        PasswordResetRequired: true

  S3User:
    Type: AWS::IAM::User
    Properties:
      UserName: s3-user
      PermissionsBoundary: !Ref S3ListBoundary
      Groups:
        - !Ref S3UserGroup
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${OneTimePassword}:SecretString:password}}'
        PasswordResetRequired: true

  S3User44:
    Type: AWS::IAM::User
    Properties:
      UserName: s3-user44
      PermissionsBoundary: !Ref S3ListBoundary
      Groups:
        - !Ref S3UserGroup
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${OneTimePassword}:SecretString:password}}'
        PasswordResetRequired: true

  # ─────────────────────────────────────────────────────────
  # Outputs
  # ─────────────────────────────────────────────────────────
Outputs:
  PasswordSecretArn:
    Description: ARN of the Secrets Manager secret holding the one-time password
    Value: !Ref OneTimePassword

  S3UserGroupName:
    Description: S3 IAM Group
    Value: !Ref S3UserGroup

  EC2UserGroupName:
    Description: EC2 IAM Group
    Value: !Ref EC2UserGroup

  EC2ReadOnlyBoundaryArn:
    Description: Permission boundary capping users at EC2 read-only
    Value: !Ref EC2ReadOnlyBoundary

  EC2FullBoundaryArn:
    Description: Permission boundary capping users at full EC2
    Value: !Ref EC2FullBoundary

  S3ListBoundaryArn:
    Description: Permission boundary capping users at S3 list operations
    Value: !Ref S3ListBoundary
